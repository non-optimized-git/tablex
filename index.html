<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TableX 表析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">
<script src="assets/lib/xlsx.full.min.js"></script>
<script src="assets/lib/exceljs.min.js"></script>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div>
        <h1>TableX</h1>
        <p>智能问卷解析</p>
      </div>
    </div>
    <div class="header-actions">
      <label class="btn btn-secondary" style="cursor:pointer">
        导入配置
        <input type="file" accept=".json" style="display:none" id="configInput">
      </label>
      <button class="btn btn-muji" id="exportConfigBtn">导出配置</button>
      <button class="btn btn-secondary" id="resetConfigBtn">重置</button>
    </div>
  </div>
</header>

<main>
  <div class="card" id="uploadCard">
    <div class="upload-zone" id="uploadZone">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
      <p id="uploadHint">拖拽 Excel 文件到此处，或点击选择</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>
  </div>

  <div class="card" id="groupSelectorCard" style="display:none">
    <h3>分组设置</h3>
    <select id="groupColSelect">
      <option value="">-- 选择分组列 --</option>
    </select>
    <div id="groupValuesContainer" style="display:none">
      <p class="label-text">选择分组：</p>
      <div class="group-values" id="groupValues"></div>
      <div id="selectedGroupsContainer" style="display:none; margin-top:12px">
        <p class="label-text">已选分组（拖动排序）：</p>
        <div class="group-values" id="selectedGroups"></div>
      </div>
    </div>
  </div>

  <div class="card" id="questionSelectorCard" style="display:none">
    <div class="result-header">
      <h3>题目选择</h3>
      <div>
        <button class="btn btn-primary" id="downloadBtn" disabled>下载 Excel</button>
        <button class="select-all" id="selectAllBtn">全选</button>
        <button class="select-all" id="selectNoneBtn">全不选</button>
      </div>
    </div>
    <p class="label-text" id="questionCount">已选择 0 题</p>
    <div id="questionList"></div>
  </div>
</main>

<footer>TableX 表析 · MUJI 风格</footer>

<script src="assets/js/app.js"></script>
</body>
</html>
