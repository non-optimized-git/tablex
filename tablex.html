<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TableX 表析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F0E8;
  --card: #FAF8F5;
  --border: #E8E4DC;
  --text: #3D3D3D;
  --muted: #6B6B6B;
  --light: #D5C8B5;
  --accent: #8B7355;
  --accent-hover: #7A6548;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #F5F0E8; }
::-webkit-scrollbar-thumb { background: #D5C8B5; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #E8E4DC; }
input:focus, select:focus, button:focus { outline: none; }
header {
  background: white;
  border-bottom: 1px solid #E5E7EB;
  padding: 20px 24px;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 48px;
  height: 48px;
  background: var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}
.logo-icon svg { width: 24px; height: 24px; color: white; }
.logo h1 { font-size: 20px; font-weight: 600; color: #111; }
.logo p { font-size: 14px; color: #6B7280; margin-top: 2px; }
.header-actions { display: flex; gap: 12px; }
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
}
.btn-primary { background: var(--accent); color: white; border: none; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { background: #D1D5DB; cursor: not-allowed; }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--light); }
.btn-muji { background: var(--light); color: var(--text); }
.btn-muji:hover { background: #C4B9A8; }
main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.card h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 16px; }
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
}
.upload-zone:hover { border-color: var(--light); background: #FAF8F5; }
.upload-zone.dragging { border-color: var(--accent); background: #F5F0E8; }
.upload-zone svg { width: 40px; height: 40px; color: var(--muted); margin-bottom: 12px; }
.upload-zone p { color: var(--muted); font-size: 14px; }
.upload-zone input { display: none; }
select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: white;
  color: var(--text);
}
select:focus { border-color: var(--accent); }
.label-text { font-size: 12px; color: var(--muted); margin-top: 12px; margin-bottom: 8px; }
.group-values { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.group-tag {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}
.group-tag.unselected { background: white; border: 1px solid var(--border); color: var(--muted); }
.group-tag.unselected:hover { border-color: var(--light); }
.group-tag.selected { background: var(--light); border: 1px solid var(--light); color: var(--text); }
.selected-groups { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.drag-handle { cursor: grab; font-size: 12px; opacity: 0.5; }
.dragging-item { opacity: 0.5; }
.drop-target { border: 2px dashed var(--accent) !important; background: #F5F0E8 !important; }
.question-module { margin-bottom: 16px; }
.question-module h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.question-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.question-item:hover { background: #F5F0E8; }
.question-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
.question-item span { font-size: 14px; color: var(--text); }
.question-item .type-tag { font-size: 11px; color: var(--muted); margin-left: auto; }
.select-all { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 4px 8px; }
.select-all:hover { color: var(--text); }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.preview-list { max-height: 500px; overflow-y: auto; }
.result-item { border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.result-item h4 { font-size: 14px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.result-item .type-tag { font-size: 11px; color: var(--muted); background: #F5F0E8; padding: 2px 8px; border-radius: 4px; }
table { width: 100%; font-size: 12px; border-collapse: collapse; }
th, td { padding: 6px 8px; text-align: left; }
th { color: var(--muted); font-weight: 400; border-bottom: 1px solid var(--border); }
td { color: var(--text); }
th.center, td.center { text-align: center; }
.base-row { background: #F5F0E8; }
.mean-row { border-top: 1px solid var(--border); }
.empty-state { text-align: center; padding: 60px; color: var(--muted); }
footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
      </div>
      <div>
        <h1>TableX 表析</h1>
        <p>智能数据解析</p>
      </div>
    </div>
    <div class="header-actions">
      <label class="btn btn-secondary" style="cursor:pointer">
        导入配置
        <input type="file" accept=".json" style="display:none" id="configInput">
      </label>
      <button class="btn btn-muji" id="exportConfigBtn">导出配置</button>
      <button class="btn btn-secondary" id="resetConfigBtn">重置</button>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="upload-zone" id="uploadZone">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
      <p id="uploadHint">拖拽 Excel 文件到此处，或点击选择</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>
  </div>

  <div class="card" id="groupSelectorCard" style="display:none">
    <h3>分组设置</h3>
    <select id="groupColSelect">
      <option value="">-- 选择分组列 --</option>
    </select>
    <div id="groupValuesContainer" style="display:none">
      <p class="label-text">选择分组并拖动排序：</p>
      <div class="group-values" id="groupValues"></div>
    </div>
  </div>

  <div class="card" id="questionSelectorCard" style="display:none">
    <div class="result-header">
      <h3>题目选择</h3>
      <div>
        <button class="select-all" id="selectAllBtn">全选</button>
        <button class="select-all" id="selectNoneBtn">全不选</button>
      </div>
    </div>
    <p class="label-text" id="questionCount">已选择 0 题</p>
    <div id="questionList"></div>
  </div>

  <div class="card" id="resultPreviewCard" style="display:none">
    <div class="result-header">
      <h3>结果预览</h3>
      <button class="btn btn-primary" id="downloadBtn">下载 Excel</button>
    </div>
    <div id="previewList">
      <div class="empty-state">请先上传 Excel 文件并选择题目</div>
    </div>
  </div>
</main>

<footer>TableX 表析</footer>

<script>
// ==================== STATE ====================
let headers = [];
let rows = [];
let selectedQuestions = [];
let groupingColIdx = null;
let groups = [];
let config = { groups: [], ordered: {}, mean_cols: {}, multi_idx: [] };

// ==================== CONSTANTS ====================
const MODULE_KEYWORDS = {
  '用户画像': ['性别', '年龄', '职业', '学历', '收入', '城市'],
  '购车意向': ['购车', '买车', '换车', '预算', '品牌'],
  '智能驾驶': ['智驾', '自动驾驶', '辅助驾驶', '泊车', '车道'],
  '家庭用车': ['家庭', '孩子', '家人', '空间'],
  '产品体验': ['满意度', '体验', '质量', '服务', '售后']
};

function getPrefix(header) {
  if (!header) return '';
  const cleaned = String(header).replace(/<[^>]*>/g, '').replace(/^[a-fA-F0-9]{6}">/, '').trim();
  const match = cleaned.match(/^([A-Za-z]?\d+[.\-]?\d*|[A-Za-z]+\d+|[一-龥]+)/);
  return match ? match[0] : cleaned.slice(0, 4);
}

function prefixSimilarity(a, b) {
  let i = 0;
  while (i < a.length && i < b.length && a[i] === b[i]) i++;
  return i / Math.max(a.length, b.length);
}

function buildSheets(questions) {
  if (!questions.length) return [];
  return questions.map(q => [q]);
}

function estimateRows(colIdx) {
  const isMulti = isMultiChoice(rows, colIdx);
  const opts = Object.keys(countOptions(rows, colIdx, isMulti));
  return 3 + opts.length + (calcNumericMean(rows, colIdx) !== null ? 1 : 0);
}

function partitionSheets(questions, maxSheets) {
  if (questions.length <= maxSheets) {
    return questions.map(q => [q]);
  }
  const perSheet = Math.ceil(questions.length / maxSheets);
  const sheets = [];
  for (let i = 0; i < maxSheets; i++) {
    const start = i * perSheet;
    if (start >= questions.length) break;
    sheets.push(questions.slice(start, start + perSheet));
  }
  return sheets;
}

function detectModule(header) {
  if (!header) return '其他';
  for (const [mod, keywords] of Object.entries(MODULE_KEYWORDS)) {
    for (const kw of keywords) {
      if (header.includes(kw)) return mod;
    }
  }
  return '其他';
}

function getShortTitle(header) {
  if (!header) return '';
  const cleaned = String(header).replace(/<[^>]*>/g, '').replace(/^[a-fA-F0-9]{6}">/, '').trim();
  const parts = cleaned.split(/[\s_#]+/);
  for (let i = parts.length - 1; i >= 0; i--) {
    if (parts[i].length >= 4) return parts[i];
  }
  return cleaned.slice(0, 20);
}

// ==================== EXCEL PARSER ====================
function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const range = XLSX.utils.decode_range(sheet['!ref']);

        const headers = [];
        for (let c = range.s.c; c <= range.e.c; c++) {
          const addr = XLSX.utils.encode_cell({ r: 0, c });
          headers.push(sheet[addr]?.v ?? null);
        }

        const rows = [];
        for (let r = 1; r <= range.e.r; r++) {
          const row = [];
          let hasValue = false;
          for (let c = range.s.c; c <= range.e.c; c++) {
            const addr = XLSX.utils.encode_cell({ r, c });
            const val = sheet[addr]?.v ?? null;
            row.push(val);
            if (val !== null && val !== '') hasValue = true;
          }
          if (hasValue) rows.push(row);
        }
        resolve({ headers, rows });
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('读取文件失败'));
    reader.readAsArrayBuffer(file);
  });
}

// ==================== ANALYZER ====================
function safe(v) {
  if (v === null || v === undefined) return null;
  const s = String(v).trim();
  return s || null;
}

function splitOpts(val) {
  if (!val) return [];
  return String(val).split(',').map(o => o.trim()).filter(o => o);
}

function groupRowsCustom(allRows, customGroups) {
  const groups = {};
  for (const groupDef of customGroups) {
    const groupName = groupDef.name;
    const conditions = groupDef.conditions;
    groups[groupName] = [];
    for (const row of allRows) {
      let match = true;
      for (const [colIdx, expectedVal] of conditions) {
        if (safe(row[colIdx]) !== expectedVal) {
          match = false;
          break;
        }
      }
      if (match) groups[groupName].push(row);
    }
  }
  return groups;
}

function countOptions(allRows, colIdx, isMulti) {
  const counts = {};
  for (const row of allRows) {
    const val = safe(row[colIdx]);
    if (val === null) continue;
    if (isMulti) {
      for (const opt of splitOpts(val)) {
        counts[opt] = (counts[opt] || 0) + 1;
      }
    } else {
      counts[val] = (counts[val] || 0) + 1;
    }
  }
  return counts;
}

function countUsers(allRows, colIdx) {
  return allRows.filter(row => safe(row[colIdx]) !== null).length;
}

function isMultiChoice(allRows, colIdx) {
  let total = 0, hasComma = 0;
  for (const row of allRows) {
    const val = row[colIdx];
    if (val === null || val === undefined) continue;
    total++;
    if (String(val).includes(',')) hasComma++;
  }
  return total > 0 && hasComma > total * 0.2;
}

function extractMidValue(opt) {
  if (!opt) return null;
  const s = String(opt);
  let m = s.match(/^(\d+)岁以下/);
  if (m) return parseInt(m[1]);
  m = s.match(/^(\d+)岁以上/);
  if (m) return parseInt(m[1]);
  m = s.match(/^(\d+)-(\d+)/);
  if (m) return (parseInt(m[1]) + parseInt(m[2])) / 2;
  return null;
}

function calcNumericMean(allRows, colIdx) {
  let total = 0, sum = 0;
  for (const row of allRows) {
    const val = row[colIdx];
    if (val === null || val === undefined) continue;
    const strVal = String(val).trim();
    if (!strVal) continue;
    const mid = extractMidValue(strVal);
    if (mid !== null) {
      total++;
      sum += mid;
    }
  }
  return total > 0 ? sum / total : null;
}

function r3(x) {
  if (x === null || x === undefined) return null;
  return Math.abs(x) < 0.0005 ? 0 : Math.round(x * 1000) / 1000;
}

// ==================== EXCEL WRITER (ExcelJS) ====================
const RED_FILL = 'FFFFCCCC';
const GREEN_FILL = 'FFCCFFCC';
const GRAY_FILL = 'FFD9D9D9';

function makeBorder() {
  return { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } };
}

function makeHeaderStyle(align) {
  return { font: { name: '黑体', size: 10 }, fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: GRAY_FILL } }, alignment: { horizontal: align }, border: makeBorder() };
}

function makeDataStyle(align, numFmt) {
  const s = { font: { name: '黑体', size: 11 }, alignment: { horizontal: align }, border: makeBorder() };
  if (numFmt) s.numFmt = numFmt;
  return s;
}

function makeFillStyle(color, align, numFmt) {
  const s = { font: { name: '黑体', size: 11 }, fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: color } }, alignment: { horizontal: align }, border: makeBorder() };
  if (numFmt) s.numFmt = numFmt;
  return s;
}

function colNumToLetter(num) {
  let result = '';
  while (num > 0) {
    const rem = (num - 1) % 26;
    result = String.fromCharCode(65 + rem) + result;
    num = Math.floor((num - 1) / 26);
  }
  return result;
}

function generateExcelWorkbook() {
  const questions = selectedQuestions;
  if (!questions.length || !headers.length || !rows.length) return null;

  const orderedGroups = groups.map(g => g.name);
  const numGroups = orderedGroups.length;
  const hasGroups = numGroups > 0;

  const table2Start = 2 + numGroups + 1;
  const table3Start = table2Start + 2 + numGroups + 1;

  const wb = new ExcelJS.Workbook();
  wb.creator = 'TableX';
  wb.created = new Date();

  // Build sheets preserving order, max 10 sheets
  const sheetGroups = partitionSheets(questions, 10);
  console.log('sheetGroups count:', sheetGroups.length, 'from', questions.length, 'questions');

  for (const groupIndices of sheetGroups) {
    const firstHeader = headers[groupIndices[0]] || `列${groupIndices[0]}`;
    const rawName = getPrefix(firstHeader).slice(0, 31) || '题目';
    let safeName = rawName.replace(/[\[\]:\\/?*]/g, '_').replace(/\|/g, '_');
    let idx = 1;
    const usedSheets = wb.worksheets.map(ws => ws.name);
    while (usedSheets.includes(safeName)) {
      safeName = rawName.replace(/[\[\]:\\/?*]/g, '_').replace(/\|/g, '_').slice(0, 28) + '_' + idx;
      idx++;
    }
    console.log('sheet:', safeName, 'questions:', groupIndices.length);
    const ws = wb.addWorksheet(safeName);

    // Set column widths
    const colWidths = [];
    if (!hasGroups) {
      colWidths.push({ width: 18 }, { width: 10 }, { width: 10 }, { width: 1 }, { width: 18 }, { width: 10 }, { width: 10 }, { width: 1 }, { width: 18 }, { width: 10 }, { width: 10 });
    } else {
      const lastCol = 3 * numGroups + 8;
      for (let c = 0; c < lastCol; c++) {
        if (c === 0 || c === numGroups + 3 || c === 2 * (numGroups + 3)) colWidths.push({ width: 18 });
        else if (c === numGroups + 2 || c === 2 * (numGroups + 2) + 1) colWidths.push({ width: 1 });
        else colWidths.push({ width: 10 });
      }
    }
    ws.columns = colWidths;

    let firstQuestion = true;
    for (const colIdx of groupIndices) {
      if (!firstQuestion) { ws.addRow(); }
      firstQuestion = false;
      const header = headers[colIdx] || `列${colIdx}`;
      const title = getShortTitle(header);
      const isMulti = isMultiChoice(rows, colIdx);

      const titleRow = ws.addRow([title]);
      titleRow.getCell(1).font = { name: '黑体', size: 14 };
      titleRow.getCell(1).alignment = { horizontal: 'left' };

      const subRow = ws.addRow([`题目: ${title} (${isMulti ? '多选' : '单选'})`]);
      subRow.getCell(1).font = { name: '黑体', size: 9 };
      subRow.getCell(1).alignment = { horizontal: 'left' };

      if (!hasGroups) {
        const t1 = { opt: 0, tot: 1 };
        const t2 = { opt: 4, tot: 5 };
        const t3 = { opt: 8, tot: 9 };

        const counts = countOptions(rows, colIdx, isMulti);
        const totalUsers = countUsers(rows, colIdx);
        const allOpts = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);

        const pctByOpt = allOpts.map(opt => {
          const val = counts[opt] || 0;
          return totalUsers > 0 ? r3(val / totalUsers) : 0;
        });
        const maxPct = Math.max(...pctByOpt);
        const minPct = Math.min(...pctByOpt);

        const hRow = ws.addRow();
        for (const t of [t1, t2, t3]) {
          hRow.getCell(t.opt + 1).value = '选项'; hRow.getCell(t.opt + 1).style = makeHeaderStyle('left');
          hRow.getCell(t.tot + 1).value = 'Total'; hRow.getCell(t.tot + 1).style = makeHeaderStyle('center');
        }

        const bRow = ws.addRow();
        for (const t of [t1, t2, t3]) {
          bRow.getCell(t.opt + 1).value = 'base'; bRow.getCell(t.opt + 1).style = makeDataStyle('left');
          bRow.getCell(t.tot + 1).value = totalUsers; bRow.getCell(t.tot + 1).style = makeDataStyle('center');
        }

        for (let oi = 0; oi < allOpts.length; oi++) {
          const opt = allOpts[oi];
          const val = counts[opt] || 0;
          const pct = pctByOpt[oi];

          const dRow = ws.addRow();
          // Table 1: counts
          dRow.getCell(t1.opt + 1).value = opt; dRow.getCell(t1.opt + 1).style = makeDataStyle('left');
          dRow.getCell(t1.tot + 1).value = val; dRow.getCell(t1.tot + 1).style = makeDataStyle('center');

          // Table 2: pct no highlight
          dRow.getCell(t2.opt + 1).value = opt; dRow.getCell(t2.opt + 1).style = makeDataStyle('left');
          dRow.getCell(t2.tot + 1).value = pct; dRow.getCell(t2.tot + 1).style = makeDataStyle('center', '0.0%');

          // Table 3: pct with highlight
          dRow.getCell(t3.opt + 1).value = opt; dRow.getCell(t3.opt + 1).style = makeDataStyle('left');
          if (pct === maxPct && maxPct > 0) dRow.getCell(t3.tot + 1).style = makeFillStyle(GREEN_FILL, 'center', '0.0%');
          else if (pct === minPct && minPct > 0 && maxPct !== minPct) dRow.getCell(t3.tot + 1).style = makeFillStyle(RED_FILL, 'center', '0.0%');
          else dRow.getCell(t3.tot + 1).style = makeDataStyle('center', '0.0%');
          dRow.getCell(t3.tot + 1).value = pct;
        }

        const meanVal = calcNumericMean(rows, colIdx);
        if (meanVal !== null) {
          const mRow = ws.addRow();
          for (const t of [t1, t2, t3]) {
            mRow.getCell(t.opt + 1).value = '平均值'; mRow.getCell(t.opt + 1).style = makeDataStyle('left');
            mRow.getCell(t.tot + 1).value = meanVal; mRow.getCell(t.tot + 1).style = makeDataStyle('center', '0.0');
          }
        }

      } else {
        const grpData = groupRowsCustom(rows, groups);
        const groupCounts = {};
        const groupUsers = {};
        for (const g of orderedGroups) {
          groupCounts[g] = countOptions(grpData[g], colIdx, isMulti);
          groupUsers[g] = countUsers(grpData[g], colIdx);
        }
        const totalCounts = countOptions(rows, colIdx, isMulti);
        const totalAllUsers = countUsers(rows, colIdx);

        const allOptsSet = new Set();
        for (const counts of Object.values(groupCounts)) {
          for (const opt of Object.keys(counts)) allOptsSet.add(opt);
        }
        for (const opt of Object.keys(totalCounts)) allOptsSet.add(opt);

        const allOptsCount = {};
        for (const counts of Object.values(groupCounts)) {
          for (const [opt, count] of Object.entries(counts)) {
            allOptsCount[opt] = (allOptsCount[opt] || 0) + count;
          }
        }
        const allOpts = [...allOptsSet].sort((a, b) => (allOptsCount[b] || 0) - (allOptsCount[a] || 0));

        const hRow = ws.addRow();
        let cellIdx = 1;
        hRow.getCell(cellIdx++).value = '选项'; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('left');
        hRow.getCell(cellIdx++).value = 'Total'; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('center');
        for (let i = 0; i < numGroups; i++) { hRow.getCell(cellIdx++).value = orderedGroups[i]; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('center'); }
        hRow.getCell(cellIdx++).value = '选项'; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('left');
        hRow.getCell(cellIdx++).value = 'Total'; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('center');
        for (let i = 0; i < numGroups; i++) { hRow.getCell(cellIdx++).value = orderedGroups[i]; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('center'); }
        hRow.getCell(cellIdx++).value = '选项'; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('left');
        hRow.getCell(cellIdx++).value = 'Total'; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('center');
        for (let i = 0; i < numGroups; i++) { hRow.getCell(cellIdx++).value = orderedGroups[i]; hRow.getCell(cellIdx - 1).style = makeHeaderStyle('center'); }

        const bRow = ws.addRow();
        cellIdx = 1;
        bRow.getCell(cellIdx++).value = 'base'; bRow.getCell(cellIdx - 1).style = makeDataStyle('left');
        bRow.getCell(cellIdx++).value = totalAllUsers; bRow.getCell(cellIdx - 1).style = makeDataStyle('center');
        for (let i = 0; i < numGroups; i++) { bRow.getCell(cellIdx++).value = groupUsers[orderedGroups[i]] || 0; bRow.getCell(cellIdx - 1).style = makeDataStyle('center'); }
        for (let t = 0; t < 2; t++) {
          bRow.getCell(cellIdx++).value = 'base'; bRow.getCell(cellIdx - 1).style = makeDataStyle('left');
          bRow.getCell(cellIdx++).value = totalAllUsers; bRow.getCell(cellIdx - 1).style = makeDataStyle('center');
          for (let i = 0; i < numGroups; i++) { bRow.getCell(cellIdx++).value = groupUsers[orderedGroups[i]] || 0; bRow.getCell(cellIdx - 1).style = makeDataStyle('center'); }
        }

        for (const opt of allOpts) {
          const pcts = {};
          for (const g of orderedGroups) {
            const val = groupCounts[g][opt] || 0;
            const total = groupUsers[g] || 0;
            pcts[g] = total > 0 ? r3(val / total) : 0;
          }
          const totalVal = totalCounts[opt] || 0;
          const totalPct = totalAllUsers > 0 ? r3(totalVal / totalAllUsers) : 0;

          const maxPct = Math.max(...Object.values(pcts), totalPct);
          const minPct = Math.min(...Object.values(pcts), totalPct);

          const dRow = ws.addRow();
          cellIdx = 1;
          // Table 1: counts
          dRow.getCell(cellIdx++).value = opt; dRow.getCell(cellIdx - 1).style = makeDataStyle('left');
          dRow.getCell(cellIdx++).value = totalVal; dRow.getCell(cellIdx - 1).style = makeDataStyle('center');
          for (let i = 0; i < numGroups; i++) { dRow.getCell(cellIdx++).value = groupCounts[orderedGroups[i]][opt] || 0; dRow.getCell(cellIdx - 1).style = makeDataStyle('center'); }
          // Table 2: pct no highlight
          dRow.getCell(cellIdx++).value = opt; dRow.getCell(cellIdx - 1).style = makeDataStyle('left');
          dRow.getCell(cellIdx++).value = totalPct; dRow.getCell(cellIdx - 1).style = makeDataStyle('center', '0.0%');
          for (let i = 0; i < numGroups; i++) { dRow.getCell(cellIdx++).value = pcts[orderedGroups[i]]; dRow.getCell(cellIdx - 1).style = makeDataStyle('center', '0.0%'); }
          // Table 3: pct with highlight - only group cols, no highlight on Total
          dRow.getCell(cellIdx++).value = opt; dRow.getCell(cellIdx - 1).style = makeDataStyle('left');
          dRow.getCell(cellIdx++).value = totalPct; dRow.getCell(cellIdx - 1).style = makeDataStyle('center', '0.0%');
          for (let i = 0; i < numGroups; i++) {
            const g = orderedGroups[i];
            const cellPct = pcts[g];
            if (cellPct === maxPct && maxPct > 0) dRow.getCell(cellIdx++).style = makeFillStyle(RED_FILL, 'center', '0.0%');
            else if (cellPct === minPct && minPct > 0 && maxPct !== minPct) dRow.getCell(cellIdx++).style = makeFillStyle(GREEN_FILL, 'center', '0.0%');
            else dRow.getCell(cellIdx++).style = makeDataStyle('center', '0.0%');
            dRow.getCell(cellIdx - 1).value = cellPct;
          }
        }

        const means = {};
        for (const g of orderedGroups) {
          means[g] = calcNumericMean(grpData[g], colIdx);
        }
        const totalMean = calcNumericMean(rows, colIdx);
        const validMeans = {};
        for (const [g, m] of Object.entries(means)) {
          if (m !== null) validMeans[g] = m;
        }
        if (totalMean !== null) validMeans['Total'] = totalMean;
        const maxM = Object.values(validMeans).length > 0 ? Math.max(...Object.values(validMeans)) : null;
        const minM = Object.values(validMeans).length > 0 ? Math.min(...Object.values(validMeans)) : null;

        const mRow = ws.addRow();
        cellIdx = 1;
        // Table 1
        mRow.getCell(cellIdx++).value = '平均值'; mRow.getCell(cellIdx - 1).style = makeDataStyle('left');
        mRow.getCell(cellIdx++).value = totalMean; mRow.getCell(cellIdx - 1).style = makeDataStyle('center', totalMean !== null ? '0.0' : '@');
        for (let i = 0; i < numGroups; i++) { const m = means[orderedGroups[i]]; mRow.getCell(cellIdx++).value = m; mRow.getCell(cellIdx - 1).style = makeDataStyle('center', m !== null ? '0.0' : '@'); }
        // Table 2
        mRow.getCell(cellIdx++).value = '平均值'; mRow.getCell(cellIdx - 1).style = makeDataStyle('left');
        mRow.getCell(cellIdx++).value = totalMean; mRow.getCell(cellIdx - 1).style = makeDataStyle('center', totalMean !== null ? '0.0' : '@');
        for (let i = 0; i < numGroups; i++) { const m = means[orderedGroups[i]]; mRow.getCell(cellIdx++).value = m; mRow.getCell(cellIdx - 1).style = makeDataStyle('center', m !== null ? '0.0' : '@'); }
        // Table 3
        mRow.getCell(cellIdx++).value = '平均值'; mRow.getCell(cellIdx - 1).style = makeDataStyle('left');
        mRow.getCell(cellIdx++).value = totalMean; mRow.getCell(cellIdx - 1).style = makeDataStyle('center', totalMean !== null ? '0.0' : '@');
        for (let i = 0; i < numGroups; i++) {
          const g = orderedGroups[i];
          const m = means[g];
          if (m !== null && Object.keys(validMeans).length >= 2) {
            if (m === maxM) mRow.getCell(cellIdx++).style = makeFillStyle(RED_FILL, 'center', '0.0');
            else if (m === minM && maxM !== minM) mRow.getCell(cellIdx++).style = makeFillStyle(GREEN_FILL, 'center', '0.0');
            else mRow.getCell(cellIdx++).style = makeDataStyle('center', '0.0');
          } else { mRow.getCell(cellIdx++).style = makeDataStyle('center', '0.0'); }
          mRow.getCell(cellIdx - 1).value = m;
        }
      }
    }
  }

  return wb;
}

async function downloadExcel() {
  try {
    console.log('questions selected:', selectedQuestions.length, 'headers:', headers.length);
    const wb = generateExcelWorkbook();
    if (!wb) {
      alert('请先上传 Excel 文件并选择题目');
      return;
    }
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '分析结果.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error('Excel export error:', err);
    alert('导出失败: ' + err.message);
  }
}

// ==================== UI HANDLERS ====================
async function handleFile(file) {
  if (!file) return;
  try {
    const result = await parseExcel(file);
    headers = result.headers;
    rows = result.rows;
    selectedQuestions = headers.map((_, i) => i);
    groupingColIdx = null;
    groups = [];
    render();
    loadSavedConfig();
  } catch (err) {
    alert('读取文件失败: ' + err.message);
  }
}

function handleGroupColChange(e) {
  groupingColIdx = e.target.value === '' ? null : parseInt(e.target.value);
  groups = [];
  render();
  saveConfig();
}

function toggleGroupValue(val) {
  const exists = groups.find(g => g.name === val && g.conditions[0][0] === groupingColIdx);
  if (exists) {
    groups = groups.filter(g => g !== exists);
  } else {
    groups.push({ name: val, conditions: [[groupingColIdx, val]] });
  }
  render();
  saveConfig();
}

function selectAllQuestions() {
  selectedQuestions = headers.map((_, i) => i);
  render();
  saveConfig();
}

function selectNoneQuestions() {
  selectedQuestions = [];
  render();
  saveConfig();
}

function toggleQuestion(idx) {
  if (selectedQuestions.includes(idx)) {
    selectedQuestions = selectedQuestions.filter(i => i !== idx);
  } else {
    selectedQuestions.push(idx);
  }
  render();
  saveConfig();
}

let dragIdx = null;

function handleGroupDragStart(e, idx) {
  dragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging-item');
}

function handleGroupDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (dragIdx === null || dragIdx === idx) return;
  const [removed] = groups.splice(dragIdx, 1);
  groups.splice(idx, 0, removed);
  dragIdx = idx;
  renderSelectedGroups();
}

function handleGroupDragEnd(e) {
  e.currentTarget.classList.remove('dragging-item');
  dragIdx = null;
  saveConfig();
}

// ==================== RENDER ====================
function hide(el) { if (el) el.style.display = 'none'; }
function show(el) { if (el) el.style.display = 'block'; }

function render() {
  const uploadZone = document.getElementById('uploadZone');
  uploadZone.classList.remove('dragging');

  const groupCard = document.getElementById('groupSelectorCard');
  const groupColSelect = document.getElementById('groupColSelect');
  const groupValuesContainer = document.getElementById('groupValuesContainer');
  const selectedGroupsContainer = document.getElementById('selectedGroupsContainer');
  const qCard = document.getElementById('questionSelectorCard');
  const rCard = document.getElementById('resultPreviewCard');

  if (headers.length === 0) {
    hide(groupCard);
    hide(document.getElementById('questionSelectorCard'));
    hide(document.getElementById('resultPreviewCard'));
    return;
  }

  show(groupCard);

  const colOptions = headers.map((h, i) => ({ idx: i, name: getShortTitle(h) || `列${i + 1}` })).filter(h => h.name);
  groupColSelect.innerHTML = '<option value="">-- 选择分组列 --</option>' +
    colOptions.map(opt => `<option value="${opt.idx}" ${groupingColIdx === opt.idx ? 'selected' : ''}>${opt.name}</option>`).join('');

  if (groupingColIdx === null) {
    hide(groupValuesContainer);
    hide(selectedGroupsContainer);
  } else {
    show(groupValuesContainer);

    const values = new Set();
    for (const row of rows) {
      const v = safe(row[groupingColIdx]);
      if (v !== null) values.add(v);
    }
    const sortedValues = [...values].sort();
    const selectedValues = groups.filter(g => g.conditions[0][0] === groupingColIdx).map(g => g.name);

    document.getElementById('groupValues').innerHTML = sortedValues.map(val => `
      <button class="group-tag ${selectedValues.includes(val) ? 'selected' : 'unselected'}"
              onclick="toggleGroupValue('${val.replace(/'/g, "\\'")}')">${val}</button>
    `).join('');

    if (groups.length > 0) {
      show(selectedGroupsContainer);
      renderSelectedGroups();
    } else {
      hide(selectedGroupsContainer);
    }
  }

  if (headers.length === 0) {
    hide(qCard);
    return;
  }
  show(qCard);

  const modules = {};
  for (let i = 0; i < headers.length; i++) {
    const mod = detectModule(headers[i]);
    const title = getShortTitle(headers[i]) || `列${i + 1}`;
    const isMulti = rows.length > 0 && isMultiChoice(rows, i);
    if (!modules[mod]) modules[mod] = [];
    modules[mod].push({ idx: i, title, isMulti });
  }

  document.getElementById('questionCount').textContent = `已选择 ${selectedQuestions.length} / ${headers.length} 题`;

  document.getElementById('questionList').innerHTML = Object.entries(modules).map(([modName, questions]) => `
    <div class="question-module">
      <h4>${modName}</h4>
      ${questions.map(q => `
        <label class="question-item">
          <input type="checkbox" ${selectedQuestions.includes(q.idx) ? 'checked' : ''} onchange="toggleQuestion(${q.idx})">
          <span>${q.title}</span>
          <span class="type-tag">${q.isMulti ? '多选' : '单选'}</span>
        </label>
      `).join('')}
    </div>
  `).join('');

  if (headers.length === 0 || selectedQuestions.length === 0) {
    hide(rCard);
    return;
  }
  show(rCard);
  document.getElementById('downloadBtn').disabled = selectedQuestions.length === 0;

  const grpData = groupRowsCustom(rows, groups);
  const orderedGroups = groups.map(g => g.name);
  const hasGroups = orderedGroups.length > 0;

  const previewHTML = [];

  for (const colIdx of selectedQuestions) {
    const header = headers[colIdx] || `列${colIdx}`;
    const title = getShortTitle(header);
    const isMulti = isMultiChoice(rows, colIdx);

    if (!hasGroups) {
      const counts = countOptions(rows, colIdx, isMulti);
      const totalUsers = countUsers(rows, colIdx);
      const allOpts = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);

      let html = `<div class="result-item">`;
      html += `<h4>${title} <span class="type-tag">${isMulti ? '多选' : '单选'}</span></h4>`;
      html += `<table><thead><tr><th>选项</th><th class="center">次数</th><th class="center">占比</th></tr></thead><tbody>`;
      html += `<tr class="base-row"><td>base</td><td class="center">${totalUsers}</td><td class="center">100%</td></tr>`;
      for (const opt of allOpts) {
        const val = counts[opt] || 0;
        const pct = totalUsers > 0 ? r3(val / totalUsers * 100) : 0;
        html += `<tr><td>${opt}</td><td class="center">${val}</td><td class="center">${pct}%</td></tr>`;
      }
      const meanVal = calcNumericMean(rows, colIdx);
      if (meanVal !== null) {
        html += `<tr class="mean-row"><td>平均值</td><td class="center" colspan="2">${r3(meanVal)}</td></tr>`;
      }
      html += `</tbody></table></div>`;
      previewHTML.push(html);
    } else {
      const groupCounts = {};
      const groupUsers = {};
      for (const g of orderedGroups) {
        groupCounts[g] = countOptions(grpData[g], colIdx, isMulti);
        groupUsers[g] = countUsers(grpData[g], colIdx);
      }
      const totalCounts = countOptions(rows, colIdx, isMulti);
      const totalAllUsers = countUsers(rows, colIdx);

      const allOptsSet = new Set();
      for (const counts of Object.values(groupCounts)) {
        for (const opt of Object.keys(counts)) allOptsSet.add(opt);
      }
      const allOptsCount = {};
      for (const counts of Object.values(groupCounts)) {
        for (const [opt, count] of Object.entries(counts)) {
          allOptsCount[opt] = (allOptsCount[opt] || 0) + count;
        }
      }
      const allOpts = [...allOptsSet].sort((a, b) => (allOptsCount[b] || 0) - (allOptsCount[a] || 0));

      let html = `<div class="result-item">`;
      html += `<h4>${title} <span class="type-tag">${isMulti ? '多选' : '单选'}</span></h4>`;
      html += `<div style="overflow-x:auto"><table><thead><tr><th>选项</th><th class="center">Total</th>`;
      for (const g of orderedGroups) html += `<th class="center">${g}</th>`;
      html += `</tr></thead><tbody>`;
      html += `<tr class="base-row"><td>base</td><td class="center">${totalAllUsers}</td>`;
      for (const g of orderedGroups) html += `<td class="center">${groupUsers[g] || 0}</td>`;
      html += `</tr>`;
      for (const opt of allOpts) {
        const totalVal = totalCounts[opt] || 0;
        const totalPct = totalAllUsers > 0 ? r3(totalVal / totalAllUsers * 100) : 0;
        html += `<tr><td>${opt}</td><td class="center">${totalPct}%</td>`;
        for (const g of orderedGroups) {
          const val = groupCounts[g][opt] || 0;
          const total = groupUsers[g] || 0;
          const pct = total > 0 ? r3(val / total * 100) : 0;
          html += `<td class="center">${pct}%</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div></div>`;
      previewHTML.push(html);
    }
  }

  document.getElementById('previewList').innerHTML = previewHTML.join('') || '<div class="empty-state">请先上传 Excel 文件并选择题目</div>';
}

function renderSelectedGroups() {
  const container = document.getElementById('selectedGroups');
  if (!container) return;
  container.innerHTML = groups.map((g, i) => `
    <div class="group-tag selected" draggable="true"
         ondragstart="handleGroupDragStart(event, ${i})"
         ondragover="handleGroupDragOver(event, ${i})"
         ondragend="handleGroupDragEnd(event)">
      <span>${g.name}</span>
    </div>
  `).join('');
}

// ==================== CONFIG ====================
function saveConfig() {
  const data = { groups, selectedQuestions, groupingColIdx, config };
  localStorage.setItem('survey_analysis_config', JSON.stringify(data));
}

function loadSavedConfig() {
  try {
    const saved = localStorage.getItem('survey_analysis_config');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.groups) groups = data.groups;
      if (data.selectedQuestions) selectedQuestions = data.selectedQuestions;
      if (data.groupingColIdx !== undefined) groupingColIdx = data.groupingColIdx;
      if (data.config) config = data.config;
      render();
    }
  } catch (e) {
    console.error('Failed to load config:', e);
  }
}

function resetConfig() {
  groups = [];
  selectedQuestions = headers.map((_, i) => i);
  groupingColIdx = null;
  config = { groups: [], ordered: {}, mean_cols: {}, multi_idx: [] };
  localStorage.removeItem('survey_analysis_config');
  render();
}

function exportConfig() {
  const data = { groups, selectedQuestions, groupingColIdx, config };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'config.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importConfig(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      if (data.groups) groups = data.groups;
      if (data.selectedQuestions) selectedQuestions = data.selectedQuestions;
      if (data.groupingColIdx !== undefined) groupingColIdx = data.groupingColIdx;
      if (data.config) config = data.config;
      saveConfig();
      render();
      alert('配置已加载');
    } catch (err) {
      alert('加载失败: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', function() {
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const configInput = document.getElementById('configInput');

  uploadZone.addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragging');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragging');
  });

  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragging');
    const file = e.dataTransfer.files?.[0];
    if (file) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files?.[0];
    if (file) handleFile(file);
  });

  configInput.addEventListener('change', importConfig);

  document.getElementById('exportConfigBtn').addEventListener('click', exportConfig);
  document.getElementById('resetConfigBtn').addEventListener('click', resetConfig);
  document.getElementById('selectAllBtn').addEventListener('click', selectAllQuestions);
  document.getElementById('selectNoneBtn').addEventListener('click', selectNoneQuestions);
  document.getElementById('downloadBtn').addEventListener('click', downloadExcel);
  document.getElementById('groupColSelect').addEventListener('change', handleGroupColChange);

  render();
  loadSavedConfig();
});
</script>
